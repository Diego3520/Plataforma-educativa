name: Lint TypeScript Variable Naming

on:
  push:
    paths:
      - backend/src/**/*.ts
  pull_request:
    paths:
      - backend/src/**/*.ts

jobs:
  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint backend/src/**/*.ts