name: ESLint

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  schedule:
    - cron: '44 1 * * 5' # Todos los viernes a 1:44 UTC

jobs:
  eslint:
    name: Run ESLint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      # Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Instalar ESLint y formatter SARIF
      - name: Install ESLint
        run: |
          npm install eslint@8.10.0
          npm install @microsoft/eslint-formatter-sarif@3.1.0

      #  Ejecutar ESLint sobre Backend
      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          # Genera eslint-results.sarif aunque no haya archivos
          touch eslint-results.sarif
          npx eslint Backend \
            --config .eslintrc.json \
            --ext .js,.jsx,.ts,.tsx \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif || true
        continue-on-error: true

      # Subir resultados SARIF a GitHub
      - name: Upload analysis results to GitHub
        if: ${{ always() }}  # evita que falle si no hay SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./eslint-results.sarif
          wait-for-processing: true
