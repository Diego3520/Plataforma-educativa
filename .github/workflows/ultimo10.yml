name: ESLint
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  schedule:
    - cron: '44 1 * * 5'

jobs:
  eslint:
    name: Run ESLint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install project dependencies
        run: npm install
        working-directory: ./Backend
      
      - name: Install additional dependencies
        run: |
          npm install --no-save @microsoft/eslint-formatter-sarif@3.1.0
        working-directory: ./Backend
      
      - name: Run ESLint (Strict - Fails on errors)
        run: |
          npx eslint . \
            --config ../.eslintrc.json \
            --ext .js,.jsx,.ts,.tsx \
            --max-warnings 0
        working-directory: ./Backend
      
      - name: Run ESLint for SARIF report
        if: always()
        run: |
          npx eslint . \
            --config ../.eslintrc.json \
            --ext .js,.jsx,.ts,.tsx \
            --format @microsoft/eslint-formatter-sarif \
            --output-file ../eslint-results.sarif || true
          echo "sarif_exists=true" >> $GITHUB_OUTPUT
        continue-on-error: true
        working-directory: ./Backend
        id: run_eslint_sarif
      
      - name: Upload analysis results to GitHub
        if: steps.run_eslint_sarif.outputs.sarif_exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./eslint-results.sarif
          wait-for-processing: true
