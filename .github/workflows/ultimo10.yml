name: ESLint

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  schedule:
    - cron: '44 1 * * 5'

jobs:
  eslint:
    name: Run ESLint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ESLint
        run: |
          npm install eslint@8.10.0
          npm install @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          FILES=$(find Backend -type f \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \))
          if [ -n "$FILES" ]; then
            npx eslint Backend \
              --config .eslintrc.json \
              --ext .js,.jsx,.ts,.tsx \
              --format @microsoft/eslint-formatter-sarif \
              --output-file eslint-results.sarif || true
          else
            echo "No JS/TS files to lint, skipping SARIF generation."
          fi
        continue-on-error: true

      - name: Upload analysis results to GitHub
        if: ${{ steps.Run_ESLint.outputs.sarif_exists == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./eslint-results.sarif
          wait-for-processing: true
