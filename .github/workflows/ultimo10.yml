name: ESLint
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  schedule:
    - cron: '44 1 * * 5'

jobs:
  eslint:
    name: Run ESLint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install eslint@8.10.0
          npm install @microsoft/eslint-formatter-sarif@3.1.0
          npm install @typescript-eslint/parser@latest
          npm install @typescript-eslint/eslint-plugin@latest
          npm install eslint-plugin-check-file@latest
      
      - name: Run ESLint (Strict - Fails on errors)
        run: |
          FILES=$(find Backend -type f \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \))
          if [ -n "$FILES" ]; then
            npx eslint Backend \
              --config .eslintrc.json \
              --ext .js,.jsx,.ts,.tsx \
              --max-warnings 0
          else
            echo "No JS/TS files to lint"
          fi
      
      - name: Run ESLint for SARIF report
        if: always()
        run: |
          FILES=$(find Backend -type f \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \))
          if [ -n "$FILES" ]; then
            npx eslint Backend \
              --config .eslintrc.json \
              --ext .js,.jsx,.ts,.tsx \
              --format @microsoft/eslint-formatter-sarif \
              --output-file eslint-results.sarif || true
            echo "sarif_exists=true" >> $GITHUB_OUTPUT
          else
            echo "sarif_exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
        id: run_eslint_sarif
      
      - name: Upload analysis results to GitHub
        if: steps.run_eslint_sarif.outputs.sarif_exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./eslint-results.sarif
          wait-for-processing: true
